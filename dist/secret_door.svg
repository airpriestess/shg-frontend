<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E0A0"/>
      <stop offset="20%" stop-color="#E8B870"/>
      <stop offset="52%" stop-color="#BFA5D8"/>
      <stop offset="78%" stop-color="#2CB7A7"/>
      <stop offset="100%" stop-color="#167A6B"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2CB7A7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#167A6B" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="doorgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0d08"/>
      <stop offset="100%" stop-color="#0a0c0c"/>
    </linearGradient>
    <filter id="gf">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="lightpool" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#2CB7A7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background — deep black -->
  <rect width="600" height="800" fill="#050505"/>

  <!-- Floor light pool -->
  <ellipse cx="300" cy="780" rx="220" ry="60" fill="url(#lightpool)"/>

  <!-- Wall arch surround — gradient stroke -->
  <path d="M 140 780 L 140 320 Q 140 180 300 160 Q 460 180 460 320 L 460 780"
        fill="none" stroke="url(#lg)" stroke-width="1.5" opacity="0.6"/>

  <!-- Door frame outer -->
  <rect x="155" y="260" width="290" height="520" rx="4"
        fill="none" stroke="url(#lg)" stroke-width="1"/>

  <!-- Door panel — dark rich surface -->
  <rect x="163" y="268" width="274" height="504" rx="3"
        fill="url(#doorgrad)" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>

  <!-- Door panels — upper two -->
  <rect x="180" y="290" width="112" height="140" rx="2"
        fill="none" stroke="url(#lg)" stroke-width="0.8" opacity="0.5"/>
  <rect x="308" y="290" width="112" height="140" rx="2"
        fill="none" stroke="url(#lg)" stroke-width="0.8" opacity="0.5"/>

  <!-- Door panels — middle two -->
  <rect x="180" y="448" width="112" height="100" rx="2"
        fill="none" stroke="url(#lg)" stroke-width="0.8" opacity="0.5"/>
  <rect x="308" y="448" width="112" height="100" rx="2"
        fill="none" stroke="url(#lg)" stroke-width="0.8" opacity="0.5"/>

  <!-- Door panels — lower two -->
  <rect x="180" y="565" width="112" height="110" rx="2"
        fill="none" stroke="url(#lg)" stroke-width="0.8" opacity="0.5"/>
  <rect x="308" y="565" width="112" height="110" rx="2"
        fill="none" stroke="url(#lg)" stroke-width="0.8" opacity="0.5"/>

  <!-- Light seeping through — the gap/crack of the door -->
  <line x1="300" y1="268" x2="300" y2="772"
        stroke="url(#lg)" stroke-width="1.5" opacity="0.7" filter="url(#softglow)"/>

  <!-- Keyhole -->
  <circle cx="380" cy="520" r="6"
          fill="none" stroke="url(#lg)" stroke-width="1.2"/>
  <path d="M 377 526 L 380 548 L 383 526"
        fill="none" stroke="url(#lg)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Handle -->
  <circle cx="226" cy="520" r="4" fill="url(#lg)"/>
  <line x1="222" y1="520" x2="210" y2="520"
        stroke="url(#lg)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Arch keystone accent -->
  <path d="M 285 165 Q 300 155 315 165"
        fill="none" stroke="url(#lg)" stroke-width="1.5" opacity="0.8"/>
  <circle cx="300" cy="158" r="3" fill="url(#lg)" opacity="0.9"/>

  <!-- Subtle glow above door -->
  <ellipse cx="300" cy="200" rx="80" ry="30" fill="#2CB7A7" opacity="0.06" filter="url(#gf)"/>

  <!-- Text -->
  <text x="300" y="106" text-anchor="middle"
        font-family="'Georgia', serif" font-style="italic" font-size="13"
        letter-spacing="3" fill="#BFA5D8" opacity="0.8">the secret</text>

  <text x="300" y="130" text-anchor="middle"
        font-family="'Georgia', serif" font-size="26" font-weight="400"
        letter-spacing="1" fill="#f2ece4">is the state.</text>

  <text x="300" y="735" text-anchor="middle"
        font-family="'Georgia', serif" font-style="italic" font-size="12"
        letter-spacing="2" fill="#2CB7A7" opacity="0.7">theta · alpha · delta</text>

</svg>
